name: Bump Build Number

on:
  push:
    branches:
      - dev_2.0

jobs:
  bump-build:
    # Skip if this is the action's own bump commit
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Bump build number and date
        run: |
          python3 - <<'EOF'
          import re
          from datetime import date

          with open('config/includes/mscp-data.yaml', 'r') as f:
              content = f.read()

          # Increment build number
          content = re.sub(
              r'(  build:\s*)(\d+)',
              lambda m: m.group(1) + str(int(m.group(2)) + 1),
              content
          )

          # Update build date
          content = re.sub(
              r'(  build_date:\s*")[^"]*"',
              f'  build_date: "{date.today()}"',
              content
          )

          with open('config/includes/mscp-data.yaml', 'w') as f:
              f.write(content)
          EOF

      - name: Commit updated build number
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/includes/mscp-data.yaml
          git commit -m "chore: bump build number [skip ci]"
          git push
